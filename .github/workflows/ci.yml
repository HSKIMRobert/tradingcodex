name: CI (no deploy)
run-name: CI checks only (no deploy) - ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  invariant-gate:
    name: Safety and financial invariant gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with development extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run release-blocking negative and concurrency tests
        run: >-
          pytest
          tests/test_security_invariants.py
          tests/test_improvement_invariants.py
          tests/test_mcp_broker_release_health.py
          tests/test_runtime_profile.py
          tests/test_broker_center_prd.py

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    needs: invariant-gate
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with development extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run Django checks
        run: python manage.py check

      - name: Check migrations are current
        run: python manage.py makemigrations --check --dry-run

      - name: Compile Python sources
        run: python -m compileall tradingcodex_cli tradingcodex_service apps tests

  package-smoke:
    name: Build and smoke-test clean wheel
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Install and smoke-test only the built wheel
        run: |
          python -m venv /tmp/tcx-wheel-venv
          /tmp/tcx-wheel-venv/bin/pip install dist/*.whl
          /tmp/tcx-wheel-venv/bin/python -c 'from importlib.metadata import version; from tradingcodex_service import __version__; assert version("tradingcodex") == __version__'
          export PATH="/tmp/tcx-wheel-venv/bin:$PATH"
          rm -rf /tmp/tcx-wheel-smoke
          mkdir -p /tmp/tcx-wheel-smoke
          cd /tmp/tcx-wheel-smoke
          /tmp/tcx-wheel-venv/bin/tcx attach .
          ./tcx doctor
          ./tcx db migrate
          printf '{"jsonrpc":"2.0","id":1,"method":"tools/list"}\n' | ./tcx mcp stdio | /tmp/tcx-wheel-venv/bin/python -c 'import json,sys; payload=json.load(sys.stdin); assert payload["result"]["tools"]'
