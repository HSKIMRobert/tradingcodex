[mcp_servers.tradingcodex]
command = "uvx"
args = ["--refresh", "--from", {{TRADINGCODEX_MCP_PACKAGE_SPEC_TOML}}, "python", "-m", "tradingcodex_cli", "mcp", "stdio"]
enabled = true
cwd = "."
env = { TRADINGCODEX_HOME = {{TRADINGCODEX_HOME_TOML}}, TRADINGCODEX_HOME_SOURCE = {{TRADINGCODEX_HOME_SOURCE_TOML}}{{TRADINGCODEX_DB_ENV_TOML}}, TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1", TRADINGCODEX_MCP_PRINCIPAL = "head-manager", TRADINGCODEX_SERVICE_ADDR = {{TRADINGCODEX_SERVICE_ADDR_TOML}}, TRADINGCODEX_WORKSPACE_ROOT = "." }
enabled_tools = [
  "get_tradingcodex_status",
  "get_runtime_mode",
  "get_update_status",
  "record_workflow_plan",
  "record_artifact_supervisor_loop",
  "simulate_policy",
  "get_order_status",
  "list_broker_connections",
  "get_broker_connection_status",
  "list_broker_adapter_providers",
  "connect_broker_connector",
  "scaffold_broker_connector",
  "register_broker_connector",
  "validate_broker_connector_build",
  "get_broker_capability_profile",
  "get_broker_instrument_constraints",
  "preview_order_translation",
  "get_connector_build_status",
  "list_reconciliation_runs",
  "get_order_ticket",
  "list_order_tickets",
  "record_broker_mapping_review",
  "get_positions",
  "get_portfolio_snapshot",
  "list_workflow_artifacts",
  "create_research_artifact",
  "get_research_artifact",
  "list_research_artifacts",
  "search_research_artifacts",
  "append_research_artifact_version",
  "export_research_artifact_md",
  "record_source_snapshot",
  "list_external_mcp_connections",
  "register_external_mcp_connection",
  "check_external_mcp_connection",
  "discover_external_mcp_connection",
  "review_external_mcp_tool",
  "record_audit_event"
]
default_tools_approval_mode = "approve"
startup_timeout_sec = 20
tool_timeout_sec = 30

[shell_environment_policy]
inherit = "core"
set = {}
exclude = [
  "*API_KEY*",
  "*SECRET*",
  "*TOKEN*",
  "BROKER_*",
  "BROKER_API_KEY",
  "BROKER_API_SECRET",
  "TRADING_API_KEY",
  "TRADING_API_SECRET"
]
