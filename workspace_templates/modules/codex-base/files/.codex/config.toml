[mcp_servers.tradingcodex]
command = "{{PYTHON_EXECUTABLE}}"
args = ["{{PROJECT_DIR}}/.tradingcodex/mcp/server.py"]
enabled = true
env = { TRADINGCODEX_MCP_AUTOSTART_SERVICE = "1", TRADINGCODEX_SERVICE_ADDR = "127.0.0.1:8000" }
enabled_tools = [
  "simulate_policy",
  "get_order_status",
  "get_positions",
  "get_portfolio_snapshot",
  "list_workflow_artifacts",
  "create_research_artifact",
  "get_research_artifact",
  "list_research_artifacts",
  "search_research_artifacts",
  "append_research_artifact_version",
  "export_research_artifact_md",
  "record_source_snapshot",
  "record_audit_event"
]
default_tools_approval_mode = "prompt"
startup_timeout_sec = 20
tool_timeout_sec = 30

[mcp_servers.openbb]
command = "uvx"
args = [
  "--from",
  "openbb-mcp-server",
  "--with",
  "openbb",
  "openbb-mcp",
  "--transport",
  "stdio",
  "--allowed-categories",
  "equity,news,economy,regulators,index,etf,fixedincome,currency",
  "--default-categories",
  "admin",
  "--tool-discovery"
]
enabled = false
env = { OPENBB_MCP_DEFAULT_SKILLS_DIR = "" }
default_tools_approval_mode = "prompt"
startup_timeout_sec = 30
tool_timeout_sec = 60

[shell_environment_policy]
inherit = "core"
set = {}
exclude = [
  "*API_KEY*",
  "*SECRET*",
  "*TOKEN*",
  "BROKER_*",
  "BROKER_API_KEY",
  "BROKER_API_SECRET",
  "TRADING_API_KEY",
  "TRADING_API_SECRET"
]
