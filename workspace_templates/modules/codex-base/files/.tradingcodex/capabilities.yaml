principals:
  head-manager:
    capabilities:
      - workflow.manage
      - subagent.assign
      - skill.propose_change
      - order_ticket.request
      - mcp.tradingcodex.get_tradingcodex_status
      - mcp.tradingcodex.simulate_policy
      - mcp.tradingcodex.get_order_status
      - mcp.tradingcodex.list_broker_connections
      - mcp.tradingcodex.get_broker_connection_status
      - mcp.tradingcodex.list_reconciliation_runs
      - mcp.tradingcodex.get_order_ticket
      - mcp.tradingcodex.list_order_tickets
      - mcp.tradingcodex.record_broker_mapping_review
    denied:
      - api_key.read
      - broker.raw_api
      - cash.withdraw
      - cash.transfer

  execution-operator:
    capabilities:
      - mcp.tradingcodex.submit_approved_order
      - mcp.tradingcodex.get_order_status
      - mcp.tradingcodex.get_order_ticket
      - mcp.tradingcodex.list_order_tickets
    denied:
      - api_key.read
      - broker.raw_api
      - policy.write

  portfolio-manager:
    capabilities:
      - portfolio.review
      - order_ticket.create
      - order_ticket.check
      - broker_account.sync
      - mcp.tradingcodex.create_order_ticket
      - mcp.tradingcodex.run_order_checks
      - audit.write
    denied:
      - approval.self_issue
      - mcp.tradingcodex.submit_approved_order
      - api_key.read
      - broker.raw_api

  risk-manager:
    capabilities:
      - policy.evaluate
      - approval.review
      - approval_receipt.create
      - order_ticket.check
      - mcp.tradingcodex.validate_approval_receipt
      - mcp.tradingcodex.request_order_approval
      - audit.review
    denied:
      - mcp.tradingcodex.submit_approved_order
      - api_key.read
      - broker.raw_api

  analysts:
    capabilities:
      - research.read
      - report.write
    denied:
      - approval.read
      - execution.submit
      - api_key.read
      - broker.raw_api
