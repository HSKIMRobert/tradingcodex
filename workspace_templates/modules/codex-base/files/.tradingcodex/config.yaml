name: tradingcodex
generated_at: "{{GENERATED_AT}}"
version: "{{TRADINGCODEX_VERSION}}"

service:
  db_mode: central-local
  default_db: {{TRADINGCODEX_DB_PATH_YAML}}
  db_source: {{TRADINGCODEX_DB_SOURCE_YAML}}
  workspace_root_is_provenance_only: true

execution:
  live_enabled: false
  max_single_order_base: 100000
  enabled_adapters:
    - paper-trading
  enabled_execution_postures:
    - paper_only
    - broker_validation_only

subagents:
  reserved_threads: 1
  overflow_strategy: batch_queue
